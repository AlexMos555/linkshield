name: E2E — Landing (Playwright)

on:
  workflow_dispatch:  # allow manual re-runs after backend-only fixes
  pull_request:
    paths:
      - "landing/**"
      - "packages/i18n-strings/**"
      - "scripts/build-i18n.py"
      - ".github/workflows/e2e-landing.yml"
  push:
    branches: [main]
    paths:
      - "landing/**"
      - "packages/i18n-strings/**"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: landing

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      # Monorepo uses npm workspaces — install from root.
      # The lockfile was generated on macOS and even `npm install` won't
      # re-fetch the linux variants of platform-native deps (@tailwindcss/oxide,
      # @parcel/watcher, lightningcss) when their lockfile entries pin
      # platform-specific tarballs that don't match the runner OS. We delete
      # the lockfile so npm re-resolves from package.json on Linux from scratch,
      # then `npm install` picks the correct native bindings for x64-linux-gnu.
      # Reproducibility cost is small here — this job only builds + runs Playwright,
      # not a release artifact.
      - name: Install dependencies
        working-directory: .
        # --legacy-peer-deps: mobile/ workspace has react-native-get-random-values@2
        # which declares peer react-native>=0.81 but we're pinned to 0.76.9 by
        # Expo SDK 52 (deferred until SDK 53/54 migration). Conflict is unrelated
        # to landing build and was previously masked by `npm ci`.
        run: |
          rm -f package-lock.json
          npm install --include=optional --legacy-peer-deps --no-audit --no-fund

      - name: Build landing
        run: npm run build

      # Playwright browsers — always install. The previous cache key was based
      # on landing/package-lock.json which doesn't exist (workspace lockfile is
      # at root, and we delete-then-regenerate it above). That gave an empty
      # hash key, which led to cache hits on STALE entries — playwright system
      # deps were installed but the browser binaries were missing, so tests
      # failed with "Executable doesn't exist". Unconditional install is ~30s
      # slower but reliable.
      - name: Install Playwright browsers
        working-directory: landing
        run: npx playwright install --with-deps chromium webkit

      - name: Run Playwright tests
        run: npm run e2e
        env:
          CI: "true"

      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: landing/playwright-report/
          retention-days: 7

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: landing/test-results/
          retention-days: 7

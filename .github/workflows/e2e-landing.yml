name: E2E — Landing (Playwright)

on:
  workflow_dispatch:  # allow manual re-runs after backend-only fixes
  pull_request:
    paths:
      - "landing/**"
      - "packages/i18n-strings/**"
      - "scripts/build-i18n.py"
      - ".github/workflows/e2e-landing.yml"
  push:
    branches: [main]
    paths:
      - "landing/**"
      - "packages/i18n-strings/**"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: landing

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      # Monorepo uses npm workspaces — install from root.
      # The lockfile was generated on macOS and even `npm install` won't
      # re-fetch the linux variants of platform-native deps (@tailwindcss/oxide,
      # @parcel/watcher, lightningcss) when their lockfile entries pin
      # platform-specific tarballs that don't match the runner OS. We delete
      # the lockfile so npm re-resolves from package.json on Linux from scratch,
      # then `npm install` picks the correct native bindings for x64-linux-gnu.
      # Reproducibility cost is small here — this job only builds + runs Playwright,
      # not a release artifact.
      - name: Install dependencies
        working-directory: .
        run: |
          rm -f package-lock.json
          npm install --include=optional --no-audit --no-fund

      - name: Build landing
        run: npm run build

      # Playwright browsers — cache per version + OS
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('landing/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit

      - name: Install Playwright system deps (cached hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit

      - name: Run Playwright tests
        run: npm run e2e
        env:
          CI: "true"

      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: landing/playwright-report/
          retention-days: 7

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: landing/test-results/
          retention-days: 7

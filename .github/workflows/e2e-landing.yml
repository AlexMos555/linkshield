name: E2E — Landing (Playwright)

on:
  pull_request:
    paths:
      - "landing/**"
      - "packages/i18n-strings/**"
      - "scripts/build-i18n.py"
      - ".github/workflows/e2e-landing.yml"
  push:
    branches: [main]
    paths:
      - "landing/**"
      - "packages/i18n-strings/**"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: landing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Monorepo uses npm workspaces — install from root
      - name: Install dependencies
        working-directory: .
        # --include=optional ensures platform-specific native bindings
        # (e.g. @parcel/watcher-linux-x64-glibc used by next-intl + tailwind
        # devServer) are installed. Without it, `next build` fails on CI
        # Linux runners with "No prebuild of @parcel/watcher found".
        run: npm ci --include=optional

      - name: Build landing
        run: npm run build

      # Playwright browsers — cache per version + OS
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('landing/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit

      - name: Install Playwright system deps (cached hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit

      - name: Run Playwright tests
        run: npm run e2e
        env:
          CI: "true"

      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: landing/playwright-report/
          retention-days: 7

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: landing/test-results/
          retention-days: 7

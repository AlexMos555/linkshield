name: Weekly fresh-URL benchmark (recall transparency)

# Once a week, fetch the latest URLhaus + PhishTank phishing feeds,
# run them through cleanway.ai/api/v1/public/check + Cloudflare
# 1.1.1.1 for Families + (when keys are configured) Google Safe
# Browsing + VirusTotal aggregate, and publish the results.
#
# This is the credibility moat for go-to-market: every other vendor
# publishes glossy threat reports. We publish the actual recall +
# FPR + per-vendor breakdown, every week, on the same script anyone
# can clone and re-run.
#
# The committed JSON+MD output lives under docs/benchmarks/, with
# a 'latest.json' symlink that the landing page reads to render
# the live methodology section.

on:
  schedule:
    - cron: '15 5 * * 1'   # Mondays 05:15 UTC — off-peak everywhere,
                            # gives us the freshest Sunday-night PhishTank dump
  workflow_dispatch:
    inputs:
      sample:
        description: 'URLs per side (phishing + legit)'
        type: number
        default: 200

permissions:
  contents: write       # commit benchmark results
  pull-requests: write  # raise a PR on recall regression

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          # We need full history to compare against the previous
          # week's recall for regression detection.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install httpx

      - name: Run benchmark
        env:
          # Public endpoints don't need keys but secrets are honoured.
          GOOGLE_SAFE_BROWSING_KEY: ${{ secrets.GOOGLE_SAFE_BROWSING_KEY }}
          PHISHTANK_API_KEY: ${{ secrets.PHISHTANK_API_KEY }}
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          # We deliberately use the live PUBLIC endpoint here, not
          # --local-analyzer. The point is to measure what a real
          # user would see when they share a `cleanway.ai/check/<X>`
          # link. Public-only run keeps the benchmark anonymous,
          # exactly like a curious developer would.
          python scripts/eval_fresh_urls.py \
            --sample ${{ github.event.inputs.sample || 200 }} \
            --out-tag "$(date -u +%Y-%m-%d)"

      - name: Show latest pointer state
        run: |
          # The Python script owns the latest.json update now, guarded by
          # its --enforce-quality-gate flag (default on). If the run was
          # junk (rate-limit blowout, empty samples, null recall) the
          # pointer is deliberately left untouched. Print state so cron
          # log makes it obvious which run is currently public.
          cd docs/benchmarks
          ls -la
          if [ -L latest.json ] || [ -f latest.json ]; then
            echo "latest.json -> $(readlink latest.json 2>/dev/null || echo '(file)')"
          else
            echo "WARNING: docs/benchmarks/latest.json missing"
          fi

      - name: Detect recall regression
        id: regression
        run: |
          python3 <<'PY'
          import json, glob, os, sys
          files = sorted(glob.glob('docs/benchmarks/2*.json'))
          if len(files) < 2:
              print("regression=false", file=open(os.environ['GITHUB_OUTPUT'], 'a'))
              sys.exit(0)
          with open(files[-1]) as f:
              today = json.load(f)
          with open(files[-2]) as f:
              prior = json.load(f)
          today_recall = today['phishing'].get('cleanway', {}).get('recall')
          prior_recall = prior['phishing'].get('cleanway', {}).get('recall')
          regressed = False
          if today_recall is not None and prior_recall is not None:
              drop = prior_recall - today_recall
              if drop > 0.05:  # >5pp drop is regression
                  regressed = True
                  print(f"::warning::Recall dropped from {prior_recall:.1%} to {today_recall:.1%}")
          print(f"regression={'true' if regressed else 'false'}", file=open(os.environ['GITHUB_OUTPUT'], 'a'))
          PY

      - name: Commit results
        run: |
          git config user.name 'cleanway-bot'
          git config user.email 'bot@cleanway.ai'
          git add docs/benchmarks/
          if git diff --staged --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "chore: weekly fresh-URL benchmark $(date -u +%Y-%m-%d)

          Auto-generated by .github/workflows/weekly-benchmark.yml.
          Reproduce: python3 scripts/eval_fresh_urls.py --sample 100
          "
          git push

      - name: Open regression PR
        if: steps.regression.outputs.regression == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: cleanway/recall-regression-alert
          delete-branch: true
          title: '🚨 Weekly benchmark: recall regression detected'
          body: |
            The weekly fresh-URL benchmark shows the Cleanway public
            endpoint dropped >5pp in recall against fresh URLhaus +
            PhishTank URLs.

            **Possible causes:**
            - One of the 16 threat-intel sources is failing (check
              circuit breaker status at api.cleanway.ai/health)
            - A paid API key expired or hit quota
            - Cloudflare / upstream proxies started flagging us
            - URLhaus changed their feed format

            **Action:** investigate before publishing this week's
            methodology page snapshot.

            Recent benchmark files:
            - docs/benchmarks/latest.json
            - docs/benchmarks/$(date -u +%Y-%m-%d)-fresh-urls.json
          add-paths: docs/benchmarks/

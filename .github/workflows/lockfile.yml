name: Lockfile sync

# We hit the same class of bug TWICE in 2026:
#   - 591 (post-rebrand): bulk rename mutated package names but didn't
#     touch package-lock.json → CI's `npm ci` failed.
#   - 2026-05-05 (post-dependabot): dependabot bumped @types/node in
#     `landing/package.json` only; the workspace-root lock didn't pick
#     up the new resolution → E2E's `npm ci` failed on main.
#
# This workflow catches both cases at PR time. Trigger on any PR that
# touches a `package.json`. We regenerate `package-lock.json` (no install
# needed — `--package-lock-only` is offline-friendly and fast) and fail
# if the resulting diff is non-empty. The fix on the developer side is
# always the same: run `npm install --package-lock-only` locally and
# commit the resulting lock.

on:
  pull_request:
    paths:
      - "**/package.json"
      - "package-lock.json"
      - ".github/workflows/lockfile.yml"
  push:
    branches: [main]
    paths:
      - "**/package.json"
      - "package-lock.json"
      - ".github/workflows/lockfile.yml"

jobs:
  verify:
    name: Verify package-lock is in sync
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      # The regen-and-diff approach is platform-sensitive: Linux records
      # libc arrays for optional native deps (fsevents, lightningcss-…),
      # macOS doesn't, so a lock generated on a dev's Mac will never match
      # one regenerated on Ubuntu. `npm ci` is platform-neutral: it just
      # checks that every package.json constraint resolves to the locked
      # version, and fails (non-zero exit) if anything's out of sync.
      #
      # --ignore-scripts: skip postinstall hooks. We don't need them; we're
      #                   not running the code, only validating the lock.
      # --no-audit / --no-fund: cosmetic noise we don't need in CI logs.
      - name: Verify package-lock matches workspace package.json files
        run: npm ci --no-audit --ignore-scripts --no-fund

      - name: Helpful failure message
        if: failure()
        run: |
          echo ""
          echo "::error::package-lock.json is out of sync with one or more workspace package.json files."
          echo "::error::Run 'npm install --package-lock-only' locally and commit the resulting lock."

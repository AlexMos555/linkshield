name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DEBUG: "true"
      SUPABASE_JWT_SECRET: "test-secret-for-development-only-not-for-production-use"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=api \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=50

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Run benchmark (if PhishTank data available)
        run: |
          if [ -f data/phishtank.csv ]; then
            python -m tests.benchmark_scoring
          else
            echo "PhishTank data not available, skipping benchmark"
          fi

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.8.6

      - name: Lint
        run: ruff check api/ tests/ ml/

  # Docker build job disabled — we removed the Dockerfile (commit 208efd2)
  # so Railway uses Nixpacks + Procfile. Railway's build on every push is
  # effectively this job's replacement. Re-enable if we reintroduce Docker.
  docker:
    runs-on: ubuntu-latest
    if: false
    steps:
      - run: echo "Docker build disabled — Nixpacks is the builder now."

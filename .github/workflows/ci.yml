name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m tests.test_scoring
        env:
          DEBUG: "true"

      - name: Run benchmark
        run: |
          if [ -f data/phishtank.csv ]; then
            python -m tests.benchmark_scoring
          else
            echo "PhishTank data not available, skipping benchmark"
          fi
        env:
          DEBUG: "true"

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check api/ tests/ ml/ --select E,F,W

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t linkshield-api .

      - name: Verify image starts
        run: |
          docker run -d --name test-api \
            -e DEBUG=true \
            -e REDIS_URL=redis://localhost:6379 \
            -p 8000:8000 \
            linkshield-api
          sleep 3
          curl -f http://localhost:8000/ || exit 1
          docker stop test-api

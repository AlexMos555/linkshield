name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DEBUG: "true"
      SUPABASE_JWT_SECRET: "test-secret-for-development-only-not-for-production-use"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=api \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=50

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Run benchmark (if PhishTank data available)
        run: |
          if [ -f data/phishtank.csv ]; then
            python -m tests.benchmark_scoring
          else
            echo "PhishTank data not available, skipping benchmark"
          fi

      - name: Set up Node (for TS package tests)
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Test api-client error mapping
        # Pins the typed-error contract that mobile + landing + extensions
        # all rely on. Uses node's built-in TS stripper — no test runner needed.
        run: npm run test:api-client

      - name: Extension build drift guard
        # `packages/extension-core/` is the single source of truth.
        # `scripts/build-extensions.sh` fans the files out to
        # extension/, extension-firefox/, extension-safari/ with the
        # browser-specific shims layered on top. If a developer edits
        # the source but forgets to rebuild, the three browser ZIPs
        # ship stale and the bug-fix only lands in Chrome (or vice
        # versa). Run the build inside CI and fail if any tracked
        # file changed — that's our signal to rebuild locally.
        # (Audit extension-build HIGH.)
        run: |
          bash scripts/build-extensions.sh > /dev/null 2>&1
          if ! git diff --exit-code -- 'extension/' 'extension-firefox/' 'extension-safari/'; then
            echo "::error::Extension build artifacts are out of sync with packages/extension-core/. Run 'bash scripts/build-extensions.sh' locally and commit the result."
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.8.6

      - name: Lint
        run: ruff check api/ tests/ ml/

  openapi-drift:
    # Pin packages/api-types/schema/openapi.json to the live FastAPI app.
    # If a PR adds a route or schema but forgets to run `npm run build:api-types`,
    # this job fails so the stale spec doesn't leak into the typed clients.
    runs-on: ubuntu-latest
    env:
      DEBUG: "true"
      SUPABASE_JWT_SECRET: "test-secret-for-development-only-not-for-production-use"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Regenerate spec
        run: python3 scripts/dump-openapi.py
      - name: Verify spec in repo matches regenerated
        run: |
          if ! git diff --exit-code -- packages/api-types/schema/openapi.json; then
            echo ""
            echo "ERROR: packages/api-types/schema/openapi.json is out of date."
            echo "Run 'npm run build:api-types' locally and commit the result."
            exit 1
          fi

  # Docker build job disabled — we removed the Dockerfile (commit 208efd2)
  # so Railway uses Nixpacks + Procfile. Railway's build on every push is
  # effectively this job's replacement. Re-enable if we reintroduce Docker.
  docker:
    runs-on: ubuntu-latest
    if: false
    steps:
      - run: echo "Docker build disabled — Nixpacks is the builder now."

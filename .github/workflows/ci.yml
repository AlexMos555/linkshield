name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DEBUG: "true"
      SUPABASE_JWT_SECRET: "test-secret-for-development-only-not-for-production-use"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=api \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=50

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Run benchmark (if PhishTank data available)
        run: |
          if [ -f data/phishtank.csv ]; then
            python -m tests.benchmark_scoring
          else
            echo "PhishTank data not available, skipping benchmark"
          fi

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.8.6

      - name: Lint
        run: ruff check api/ tests/ ml/

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t linkshield-api .

      - name: Verify image starts
        run: |
          docker run -d --name test-api \
            -e DEBUG=true \
            -e SUPABASE_JWT_SECRET=test-secret-for-development-only-not-for-production-use \
            -e REDIS_URL=redis://localhost:6379 \
            -p 8000:8000 \
            linkshield-api
          sleep 3
          curl -f http://localhost:8000/ || exit 1
          docker stop test-api

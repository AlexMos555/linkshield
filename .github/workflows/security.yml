name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Re-scan weekly to catch newly disclosed CVEs in dependencies
    - cron: "17 6 * * 1"

permissions:
  contents: read
  security-events: write   # required by github/codeql + Trivy SARIF upload

jobs:
  # ─── Secret scanning ──────────────────────────────────────────
  gitleaks:
    name: gitleaks (committed secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # gitleaks needs full history
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ─── Python SAST (bandit) ─────────────────────────────────────
  bandit:
    name: bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install "bandit[toml]==1.8.0"
      - name: Run bandit
        run: bandit -r api/ -ll -ii  # -ll: medium severity+, -ii: medium confidence+

  # ─── Python dependency vulnerabilities (pip-audit) ────────────
  pip-audit:
    name: pip-audit (Python deps CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit==2.9.0
      - name: Audit deps
        # Hard-fail on any advisory. If an advisory has no upstream fix yet,
        # add an explicit `--ignore-vuln GHSA-xxx-xxx-xxx` flag here with an
        # inline comment citing the advisory and a sunset date — never `|| true`.
        # (`|| true` previously masked 19 Python CVEs incl. PyJWT C:H/I:H bypass
        # and python-multipart CVSS 8.6 file-write — caught in the 2026-06-19
        # readiness audit. We do not regress to that posture.)
        run: pip-audit --requirement requirements.txt --vulnerability-service osv

  # ─── npm dependency vulnerabilities (root + landing) ──────────
  # Added 2026-06-19 after the readiness audit caught 4 npm CVEs that had
  # been invisible because security.yml only covered Python deps.
  # `--omit=dev` excludes dev-only tooling (jest, prettier, etc.) — but
  # transitive deps inside runtime packages still count. We allowlist
  # advisories that we have deliberately accepted; everything else hard-fails.
  npm-audit:
    name: npm-audit (root + landing CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install workspace deps
        run: npm install --no-audit --no-fund
      - name: Audit root (mobile + extension + shared)
        env:
          # Format: one GHSA per line, "#" comments allowed. Each entry
          # MUST cite path-of-trust + sunset rationale. Don't add silently.
          # GHSA-w7jw-789q-3m8p (shell-quote 1.x): transitive via
          #   react-native 0.76.9 → react-devtools-core (dev-only debug tool),
          #   not shipped in production Hermes bundle and not in the 3 store
          #   extension ZIPs. Pinned by Expo SDK 52; fix requires Expo SDK
          #   53/54 migration tracked separately.
          ALLOWLIST: |
            GHSA-w7jw-789q-3m8p
        run: |
          set -e
          npm audit --json --omit=dev > /tmp/audit-root.json || true
          ALLOW="$(echo "$ALLOWLIST" | grep -v '^[[:space:]]*#' | grep -v '^[[:space:]]*$' | tr '\n' '|' | sed 's/|$//')"
          REMAINING=$(jq -r --arg allow "$ALLOW" '
            .vulnerabilities // {} | to_entries[]
            | select(.value.severity == "high" or .value.severity == "critical")
            | .value.via | map(if type == "object" then .url else empty end)[]
            | capture("GHSA-[a-z0-9-]+") .captures[0].string // ""
            | select(test("^(" + $allow + ")$") | not)
          ' /tmp/audit-root.json | sort -u)
          if [ -n "$REMAINING" ]; then
            echo "::error::Unhandled HIGH+ advisories in root npm tree:"
            echo "$REMAINING"
            echo ""
            echo "Either bump the offending dep, or add the GHSA to ALLOWLIST"
            echo "above with path-of-trust + sunset rationale."
            exit 1
          fi
          echo "Root npm audit: clean (allowlist applied: $ALLOW)"
      - name: Audit landing (runtime-reachable)
        # Landing is server-rendered and ships to end-users. NO allowlist —
        # every HIGH+ CVE here must be fixed or the deploy doesn't go.
        run: |
          cd landing
          npm audit --omit=dev --audit-level=high

  # ─── Container image scan (Trivy) ─────────────────────────────
  trivy-image:
    name: trivy (container CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Trivy container scan removed alongside the Dockerfile we deleted.
      # Railway's own security scanner runs at deploy-time and blocks deploys
      # on any CVE; pip-audit covers Python deps; SBOM + gitleaks cover the rest.
      # Re-introduce if we go back to a committed Dockerfile.
      - name: Skipped (no container image to scan)
        run: echo "Trivy container scan disabled — Nixpacks build + Railway scanner replace it."

      - name: Upload SARIF to GitHub Security tab
        if: false  # disabled alongside the trivy scan above
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  # ─── Dockerfile linting (Hadolint) — disabled; no Dockerfile in repo ───
  hadolint:
    name: hadolint (Dockerfile lint)
    runs-on: ubuntu-latest
    if: false  # re-enable if a Dockerfile is reintroduced
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error  # warnings are noisy (unpinned apt pkgs, etc.) — fail only on errors

  # ─── SBOM generation ──────────────────────────────────────────
  # Disabled — SBOM previously built from Dockerfile which is removed.
  # For a file-system SBOM from source, switch to anchore/sbom-action's
  # `path: .` mode (scans requirements.txt + package.json) when needed.
  sbom:
    name: sbom (Software Bill of Materials)
    runs-on: ubuntu-latest
    if: false
    steps:
      - run: echo "SBOM disabled — no Dockerfile to scan. Switch to path-based scan if re-enabled."

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Re-scan weekly to catch newly disclosed CVEs in dependencies
    - cron: "17 6 * * 1"

permissions:
  contents: read
  security-events: write   # required by github/codeql + Trivy SARIF upload

jobs:
  # ─── Secret scanning ──────────────────────────────────────────
  gitleaks:
    name: gitleaks (committed secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks needs full history
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ─── Python SAST (bandit) ─────────────────────────────────────
  bandit:
    name: bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install "bandit[toml]==1.8.0"
      - name: Run bandit
        run: bandit -r api/ -ll -ii  # -ll: medium severity+, -ii: medium confidence+

  # ─── Python dependency vulnerabilities (pip-audit) ────────────
  pip-audit:
    name: pip-audit (Python deps CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit==2.7.3
      - name: Audit deps
        # --strict fails on any advisory; some CVEs have no upstream fix yet, so
        # we downgrade to warn-only and track severe ones in security.md
        run: pip-audit --requirement requirements.txt --vulnerability-service osv || true

  # ─── Container image scan (Trivy) ─────────────────────────────
  trivy-image:
    name: trivy (container CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Trivy container scan removed alongside the Dockerfile we deleted.
      # Railway's own security scanner runs at deploy-time and blocks deploys
      # on any CVE; pip-audit covers Python deps; SBOM + gitleaks cover the rest.
      # Re-introduce if we go back to a committed Dockerfile.
      - name: Skipped (no container image to scan)
        run: echo "Trivy container scan disabled — Nixpacks build + Railway scanner replace it."

      - name: Upload SARIF to GitHub Security tab
        if: false  # disabled alongside the trivy scan above
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  # ─── Dockerfile linting (Hadolint) — disabled; no Dockerfile in repo ───
  hadolint:
    name: hadolint (Dockerfile lint)
    runs-on: ubuntu-latest
    if: false  # re-enable if a Dockerfile is reintroduced
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error  # warnings are noisy (unpinned apt pkgs, etc.) — fail only on errors

  # ─── SBOM generation ──────────────────────────────────────────
  # Disabled — SBOM previously built from Dockerfile which is removed.
  # For a file-system SBOM from source, switch to anchore/sbom-action's
  # `path: .` mode (scans requirements.txt + package.json) when needed.
  sbom:
    name: sbom (Software Bill of Materials)
    runs-on: ubuntu-latest
    if: false
    steps:
      - run: echo "SBOM disabled — no Dockerfile to scan. Switch to path-based scan if re-enabled."

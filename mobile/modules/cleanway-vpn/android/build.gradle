plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.cleanwayvpn'
version = '0.1.0'

android {
  namespace "expo.modules.cleanwayvpn"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  // DnsUtilTest.kt uses kotlin.test (JUnit backend). Test-only — does not affect the app build.
  testImplementation "org.jetbrains.kotlin:kotlin-test-junit"
}
